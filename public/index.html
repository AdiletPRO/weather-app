<!DOCTYPE html>
<html lang="ru">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>WeatherApp</title>
  <link href="https://cdnjs.cloudflare.com/ajax/libs/bootstrap/5.3.2/css/bootstrap.min.css" rel="stylesheet">
  <link rel="stylesheet" href="https://unpkg.com/leaflet@1.9.4/dist/leaflet.css">
  <link rel="stylesheet" href="css/style.css">
</head>
<body>

  <canvas id="weather-bg"></canvas>

  <!-- ШАПКА -->
  <header class="app-header">
    <div class="header-left">
      <span class="logo">🌤️ WeatherApp</span>
    </div>
    <div class="header-right">
      <div class="search-wrap">
        <input type="text" id="cityInput" placeholder="🔍 Поиск города...">
        <button id="searchBtn">Найти</button>
        <button id="geoBtn" title="Моё местоположение">📍</button>
      </div>
    </div>
  </header>

  <!-- КОНТЕНТ -->
  <main class="app-main" id="appMain">
    <p class="msg">Введи город чтобы узнать погоду</p>
  </main>

  <script src="https://cdn.jsdelivr.net/npm/chart.js"></script>
  <script src="https://unpkg.com/leaflet@1.9.4/dist/leaflet.js"></script>
  <script src="https://cdnjs.cloudflare.com/ajax/libs/bootstrap/5.3.2/js/bootstrap.bundle.min.js"></script>
  <script src="js/app.js"></script>
</body>
</html>
